    radial-gradient(circle at 20% 20%, rgba(0,150,255,.15), transparent 30%),

  overflow-x:hidden;
}

<script>
const STAFF_SPACING = 40;
const HALF_STEP = STAFF_SPACING / 2;

const SVG_NS = "http://www.w3.org/2000/svg";

const STAFF_LEFT = 150;
const STAFF_RIGHT = 1160;
const STAFF_BOTTOM_Y = 300;
// ==========================================
// AUDIO SYSTEM — BAND DIRECTOR TRANSPORT EDITION
// CHUNK 1: Globals + Init + Reverb + Transport + Background
// ==========================================

let audioCtx;
let bassReverb;

let backgroundStarted = false;
let musicStarted = false;

let audioIntervals = [];
let activePadOscs = [];
let activeEngineOsc = null;

// TRANSPORT
let transportRunning = false;
let transportStep = 0;
let transportInterval = null;
let chordIndex = 0;

// BUSES
let masterBus;
let padBus;
let percBus;
let padFilter;

// =========================
// INIT AUDIO
// =========================
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bassReverb = createReverb(6);
}

// =========================
// REVERB
// =========================
function createReverb(seconds = 2) {
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * seconds;
  const impulse = audioCtx.createBuffer(2, length, sampleRate);

  for (let channel = 0; channel < 2; channel++) {
    const data = impulse.getChannelData(channel);

    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3);
    }
  }

  const convolver = audioCtx.createConvolver();
  convolver.buffer = impulse;
  return convolver;
}

// =========================
// INTENSITY
// =========================
function getBandIntensity(score) {
  if (score >= 65) return 6;
  if (score >= 55) return 5;
  if (score >= 45) return 4;
  if (score >= 35) return 3;
  if (score >= 25) return 2;
  if (score >= 15) return 1;
  return 0;
}

// =========================
// MASTER TRANSPORT
// =========================
function startMasterTransport() {
  if (transportRunning) return;
  transportRunning = true;
  transportStep = 0;

  function tick() {
    if (!backgroundStarted) return;

    const score = state.totalCorrect || 0;
    const intensity = getBandIntensity(score);

    runTransportStep(transportStep);

    transportStep = (transportStep + 1) % 8;

    let interval = Math.max(140, 280 - intensity * 15);
    
    // Continuous speed up for Boss / Hyper Gear (50+ answers)
    if (score >= 50) {
      // Base boss tempo starts at 150ms
      let bossIntervalBase = 150;
      // Calculate how many brackets of 10 we have achieved past 50 (e.g., 50=0, 60=1, 70=2, etc.)
      const speedBracketsPastBoss = Math.floor((score - 50) / 10);
      
      // Speed up by 12ms for every 10 correct answers, capping floor speed safely at 90ms
      interval = Math.max(90, bossIntervalBase - (speedBracketsPastBoss * 12));
    }

    transportInterval = setTimeout(tick, interval);
    audioIntervals.push(transportInterval);
  }

  tick();
}

// =========================
// TRANSPORT ROUTER
// =========================
function runTransportStep(step) {
  const score = state.totalCorrect || 0;

  if (score >= 50) {
    // Boss Mode Tracks
    playBossDrums(step, score);
    playBossArp(step, score);
  } else {
    // Standard Mode Tracks
    playDrumStep(step);
    playBassStep(step);
    playArpStep(step);

    if (step === 0) {
      playChordStep();
    }

    if (step === 0 || step === 4) {
      playBeaconStep();
    }
  }
}

// =========================
// BACKGROUND SYSTEM
// =========================
function startBackgroundDrone() {
  if (backgroundStarted) return;
  backgroundStarted = true;

  masterBus = audioCtx.createGain();
  masterBus.gain.value = 0.9;
  masterBus.connect(audioCtx.destination);

  padBus = audioCtx.createGain();
  padBus.gain.value = 0.18;

  padFilter = audioCtx.createBiquadFilter();
  padFilter.type = "lowpass";
  padFilter.frequency.value = 1200;
  padFilter.Q.value = 1;
    
  bassReverb.connect(padBus);

  padBus.connect(padFilter);
  padFilter.connect(masterBus);

  percBus = audioCtx.createGain();
  percBus.gain.value = 0.28;
  percBus.connect(masterBus);

  window.sidechainGain = padBus;

  const chords = [
    [55, 82.41, 110],
    [65.41, 98, 130.81],
    [49, 73.42, 98],
    [58.27, 87.31, 116.54]
  ];

  activePadOscs = [];

  for (let i = 0; i < 4; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sawtooth";
    osc.frequency.value = chords[0][i % 3];

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.025, audioCtx.currentTime + 1.5);

    osc.connect(gain);
    gain.connect(padBus);

    osc.start();
    activePadOscs.push(osc);
  }

  window.chords = chords;
  window.currentMusicChord = chords[0];

  startEngineRumble(padBus);
  startStarCanopyPad(padBus);
  startCosmicSweeps(padBus);

  startMasterTransport();
}

// =========================
// MUSIC STARTER
// =========================
function startBackgroundMusicIfNeeded() {
  if (musicStarted) return;
  if (!state.running) return;

  musicStarted = true;
  startBackgroundDrone();
}
// ==========================================
// CHUNK 2: Transport Step Handlers
// Drums + Bass + Chords + Arp + Beacons
// ==========================================

// =========================
// CHORD STEP
// =========================
function playChordStep() {
  const score = state.totalCorrect || 0;
  const intensity = getBandIntensity(score);
  const now = audioCtx.currentTime;

  const chord = window.chords[chordIndex];

  padFilter.frequency.setTargetAtTime(
    Math.min(3200, 1200 + intensity * 180),
    now,
    0.2
  );

  activePadOscs.forEach((osc, idx) => {
    let freq = chord[idx % 3];

    if (idx === 3 && intensity >= 2) {
      freq = chord[0] * 2;
    }

    osc.frequency.setTargetAtTime(freq, now, 0.12);

    if (intensity >= 1) {
      osc.detune.setTargetAtTime(
        (Math.random() * 4 - 2) * intensity,
        now,
        0.1
      );
    }
  });

  window.currentMusicChord = chord;
  chordIndex = (chordIndex + 1) % window.chords.length;
}

// =========================
// PAD SIDECHAIN
// =========================
function duckPad() {
  if (!window.sidechainGain) return;

  const now = audioCtx.currentTime;
  const g = window.sidechainGain.gain;

  g.cancelScheduledValues(now);
  g.setValueAtTime(g.value, now);
  g.linearRampToValueAtTime(0.06, now + 0.01);
  g.linearRampToValueAtTime(0.18, now + 0.16);
}

// =========================
// DRUMS
// Drums start at 15 correct
// =========================
function playDrumStep(step) {
  const score = state.totalCorrect || 0;
  if (score < 15) return;

  const intensity = getBandIntensity(score);
  const now = audioCtx.currentTime;

  // Closed hats all 8
  const hat = audioCtx.createOscillator();
  const hatGain = audioCtx.createGain();
  const hatFilter = audioCtx.createBiquadFilter();

  hat.type = "square";
  hat.frequency.value = 9500;

  hatFilter.type = "highpass";
  hatFilter.frequency.value = 7500;

  let hatVol = 0.05 + intensity * 0.012;
  if (intensity >= 5 && step % 2) hatVol *= 1.45;

  hatGain.gain.setValueAtTime(0.0001, now);
  hatGain.gain.linearRampToValueAtTime(hatVol, now + 0.002);
  hatGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);

  hat.connect(hatFilter);
  hatFilter.connect(hatGain);
  hatGain.connect(percBus); // FIXED: Changed gain.connect to hatGain.connect

  hat.start(now);
  hat.stop(now + 0.04);

  // Open hat on 8
  if (step === 7) {
    const oh = audioCtx.createOscillator();
    const ohGain = audioCtx.createGain();

    oh.type = "square";
    oh.frequency.value = 8700;

    ohGain.gain.setValueAtTime(0.0001, now);
    ohGain.gain.linearRampToValueAtTime(0.12, now + 0.003);
    ohGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

    oh.connect(ohGain);
    ohGain.connect(percBus);

    oh.start(now);
    oh.stop(now + 0.18);
  }

  // Kick 1 + 5
  if (step === 0 || step === 4) {
    duckPad();

    const kick = audioCtx.createOscillator();
    const kickGain = audioCtx.createGain();

    kick.type = "sine";
    kick.frequency.setValueAtTime(160, now);
    kick.frequency.exponentialRampToValueAtTime(42, now + 0.14);

    kickGain.gain.setValueAtTime(0.0001, now);
    kickGain.gain.linearRampToValueAtTime(
      0.22 + intensity * 0.03,
      now + 0.004
    );
    kickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

    kick.connect(kickGain);
    kickGain.connect(percBus);

    kick.start(now);
    kick.stop(now + 0.18);
  }

  // Snare 3 + 7
  if (step === 2 || step === 6) {
    const sn = audioCtx.createOscillator();
    const snGain = audioCtx.createGain();

    sn.type = "square";
    sn.frequency.setValueAtTime(260, now);
    sn.frequency.exponentialRampToValueAtTime(100, now + 0.09);

    snGain.gain.setValueAtTime(0.0001, now);
    snGain.gain.linearRampToValueAtTime(0.15 + intensity * 0.02, now + 0.002);
    snGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.13);

    sn.connect(snGain);
    snGain.connect(percBus);

    sn.start(now);
    sn.stop(now + 0.13);
  }

  // Ghost snares 25+
  if (intensity >= 2 && (step === 1 || step === 5)) {
    const ghost = audioCtx.createOscillator();
    const ghostGain = audioCtx.createGain();

    ghost.type = "triangle";
    ghost.frequency.value = 180;

    ghostGain.gain.setValueAtTime(0.0001, now);
    ghostGain.gain.linearRampToValueAtTime(0.045, now + 0.002);
    ghostGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);

    ghost.connect(ghostGain);
    ghostGain.connect(percBus);

    ghost.start(now);
    ghost.stop(now + 0.06);
  }
}

// =========================
// BASS STEP
// =========================
function playBassStep(step) {
  if (step !== 0 && step !== 4) return;

  const score = state.totalCorrect || 0;
  const intensity = getBandIntensity(score);
  const now = audioCtx.currentTime;

  const bassNotes = [55, 65.41, 49, 58.27];
  const bassNote = bassNotes[Math.floor(chordIndex) % bassNotes.length];

  const osc = audioCtx.createOscillator();
  const harmonic = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const pan = audioCtx.createStereoPanner();

  pan.pan.value = (Math.random() * 0.4) - 0.2;

  osc.type = "triangle";
  harmonic.type = intensity >= 2 ? "sawtooth" : "triangle";

  osc.frequency.setValueAtTime(bassNote, now);
  harmonic.frequency.value = bassNote * 2;

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.linearRampToValueAtTime(
    Math.min(0.45, 0.28 + intensity * 0.03),
    now + 0.05
  );
  gain.gain.linearRampToValueAtTime(0.0001, now + 0.5);

  osc.connect(gain);
  harmonic.connect(gain);

  gain.connect(pan);
  pan.connect(padBus);

  pan.connect(bassReverb);
  bassReverb.connect(padBus);

  osc.start(now);
  harmonic.start(now);

  osc.stop(now + 0.6);
  harmonic.stop(now + 0.6);
}

// =========================
// STANDARD ARP STEP
// =========================
let arpStep = 0;

function playArpStep(step) {
  const score = state.totalCorrect || 0;
  if (score < 10) return;
  if (step % 2 !== 0) return;

  const now = audioCtx.currentTime;
  const chord = window.currentMusicChord;

  const baseFreq = chord[arpStep % chord.length];
  const arpFreq = baseFreq * 4;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "triangle";
  osc.frequency.setValueAtTime(arpFreq, now);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.linearRampToValueAtTime(0.09, now + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

  osc.connect(gain);
  gain.connect(percBus);

  osc.start(now);
  osc.stop(now + 0.2);

  arpStep++;
}

// =========================
// BEACON STEP
// =========================
function playBeaconStep() {
  const score = state.totalCorrect || 0;
  const intensity = getBandIntensity(score);

  if (Math.random() < Math.min(0.65, 0.35 + intensity * 0.04)) {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = intensity >= 4 && Math.random() < 0.3 ? "square" : "sine";
    osc.frequency.setValueAtTime(
      1000 + intensity * 50 + Math.random() * 1000,
      now
    );

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.linearRampToValueAtTime(0.018, now + 0.02);
    gain.gain.linearRampToValueAtTime(0.0001, now + 0.25);

    osc.connect(gain);
    gain.connect(percBus);

    osc.start(now);
    osc.stop(now + 0.25);
  }
}

// ==========================================
// BOSS MODE AUDIO SYSTEMS (50+ & 60+)
// ==========================================

// Calm downbeat pulse (50+) and rapid hats (60+)
function playBossDrums(step, score) {
  const now = audioCtx.currentTime;

  // Deep, "In the Zone" heartbeat sub-kick on 1 and 5
  if (step === 0 || step === 4) {
    duckPad();
    const kick = audioCtx.createOscillator();
    const kickGain = audioCtx.createGain();

    kick.type = "sine";
    kick.frequency.setValueAtTime(90, now);
    kick.frequency.exponentialRampToValueAtTime(38, now + 0.15);

    kickGain.gain.setValueAtTime(0.0001, now);
    kickGain.gain.linearRampToValueAtTime(0.28, now + 0.01);
    kickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);

    kick.connect(kickGain);
    kickGain.connect(percBus);
    kick.start(now);
    kick.stop(now + 0.25);
  }

  // 60+ Upgrade: Add high closed hats and snappy rim percussion elements
  if (score >= 60) {
    const hat = audioCtx.createOscillator();
    const hatGain = audioCtx.createGain();
    const hatFilter = audioCtx.createBiquadFilter();

    hat.type = "square";
    hat.frequency.value = 11000;
    hatFilter.type = "highpass";
    hatFilter.frequency.value = 9000;

    // Upbeat accenting on alternate ticks
    let vol = step % 2 === 0 ? 0.04 : 0.07;

    hatGain.gain.setValueAtTime(0.0001, now);
    hatGain.gain.linearRampToValueAtTime(vol, now + 0.001);
    hatGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.03);

    hat.connect(hatFilter);
    hatFilter.connect(hatGain);
    hatGain.connect(percBus);
    hat.start(now);
    hat.stop(now + 0.03);

    // Rim-shot style syncopated ping at step 2 and 6
    if (step === 2 || step === 6) {
      const rim = audioCtx.createOscillator();
      const rimGain = audioCtx.createGain();
      rim.type = "triangle";
      rim.frequency.setValueAtTime(850, now);
      rim.frequency.linearRampToValueAtTime(400, now + 0.04);

      rimGain.gain.setValueAtTime(0.0001, now);
      rimGain.gain.linearRampToValueAtTime(0.06, now + 0.002);
      rimGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);

      rim.connect(rimGain);
      rimGain.connect(percBus);
      rim.start(now);
      rim.stop(now + 0.04);
    }
  }
}

// Calmer fluid arpeggios (50+) up to high upbeat layers (60+)
let bossArpIndex = 0;
function playBossArp(step, score) {
  const now = audioCtx.currentTime;
  
  // Clean Focus Pentatonic Matrix Pattern for Boss Mode
  const bossPattern = [220, 246.94, 277.18, 329.63, 392.00, 440, 493.88, 554.37];
  const baseFreq = bossPattern[bossArpIndex % bossPattern.length];

  // Layer 1: Smooth fluid sine wave arpeggio (Plays on every step for 50+)
  const osc1 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  
  osc1.type = "sine";
  osc1.frequency.setValueAtTime(baseFreq, now);

  gain1.gain.setValueAtTime(0.0001, now);
  gain1.gain.linearRampToValueAtTime(0.08, now + 0.03);
  gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);

  osc1.connect(gain1);
  gain1.connect(percBus);
  osc1.start(now);
  osc1.stop(now + 0.35);

  // Layer 2: 60+ Upgrade — Fast, bright high-upbeat counterpoint layer
  if (score >= 60) {
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();

    osc2.type = "triangle";
    // Play one octave higher shifted forward in the scale pattern
    const highFreq = bossPattern[(bossArpIndex + 3) % bossPattern.length] * 2;
    osc2.frequency.setValueAtTime(highFreq, now);

    gain2.gain.setValueAtTime(0.0001, now);
    gain2.gain.linearRampToValueAtTime(0.07, now + 0.01);
    gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);

    osc2.connect(gain2);
    gain2.connect(percBus);
    osc2.start(now);
    osc2.stop(now + 0.15);
  }

  bossArpIndex++;
}

// ==========================================
// CHUNK 3: Ambient Systems + SFX + Cleanup
// ==========================================

// =========================
// ENGINE RUMBLE
// =========================
function startEngineRumble(masterGain) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sawtooth";
  osc.frequency.value = 45;
  gain.gain.value = 0.017;

  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();

  activeEngineOsc = osc;

  function rumbleLoop() {
    if (!backgroundStarted) return;

    const score = state.totalCorrect || 0;
    const intensity = getBandIntensity(score);
    const now = audioCtx.currentTime;

    osc.frequency.cancelScheduledValues(now);
    
    if (score >= 50) {
      // Keep drone cleanly anchored during boss round
      osc.frequency.setValueAtTime(42, now);
      gain.gain.setTargetAtTime(0.022, now, 0.2);
    } else {
      osc.frequency.setValueAtTime(
        40 + intensity + Math.random() * (15 + intensity * 4),
        now
      );
      gain.gain.setTargetAtTime(
        Math.min(0.026, 0.017 + intensity * 0.002),
        now,
        0.2
      );
    }

    const timeout = setTimeout(rumbleLoop, 240);
    audioIntervals.push(timeout);
  }

  rumbleLoop();
}

// =========================
// STAR CANOPY PAD
// =========================
function startStarCanopyPad(masterGain) {
  function melodyLoop() {
    if (!backgroundStarted) return;

    const totalCorrect = state.totalCorrect || 0;

    // Suppress ambient updates at 50+ to clear space for Boss Theme layers
    if (totalCorrect >= 30 && totalCorrect < 50 && window.currentMusicChord) {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const pan = audioCtx.createStereoPanner();

      pan.pan.value = (Math.random() * 0.8) - 0.4;

      const baseFreq =
        window.currentMusicChord[
          Math.floor(Math.random() * window.currentMusicChord.length)
        ];

      const melodyFreq = baseFreq * 4;

      osc.type = "sine";
      osc.frequency.setValueAtTime(melodyFreq, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(0.075, now + 0.8);
      gain.gain.linearRampToValueAtTime(0.0001, now + 2.8);

      osc.connect(pan);
      pan.connect(gain);
      gain.connect(bassReverb);

      osc.start(now);
      osc.stop(now + 3.0);
    }

    const timeout = setTimeout(melodyLoop, 2500);
    audioIntervals.push(timeout);
  }

  const timeout = setTimeout(melodyLoop, 2500);
  audioIntervals.push(timeout);
}

// =========================
// COSMIC SWEEPS
// =========================
function startCosmicSweeps(masterGain) {
  function sweepLoop() {
    if (!backgroundStarted) return;

    const totalCorrect = state.totalCorrect || 0;

    // Suppress standard filter sweeps at 50+ to keep the boss realm clean
    if (totalCorrect >= 20 && totalCorrect < 50) {
      const now = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const filter = audioCtx.createBiquadFilter();
      const gain = audioCtx.createGain();

      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(60, now);

      filter.type = "bandpass";
      filter.Q.value = 4;
      filter.frequency.setValueAtTime(200, now);
      filter.frequency.exponentialRampToValueAtTime(1800, now + 4);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(0.025, now + 2);
      gain.gain.linearRampToValueAtTime(0.0001, now + 5);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(bassReverb);

      osc.start(now);
      osc.stop(now + 5);
    }

    const timeout = setTimeout(sweepLoop, 8000);
    audioIntervals.push(timeout);
  }

  const timeout = setTimeout(sweepLoop, 4000);
  audioIntervals.push(timeout);
}

function playCorrectSound() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;

  [523.25, 659.25, 783.99].forEach(freq => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "triangle";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.2, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(now);
    osc.stop(now + 0.5);
  });
}

// ... rest of game code remaining identical ...

// =========================
// CLEANUP
// =========================
function stopBackgroundMusic() {
  musicStarted = false;
  backgroundStarted = false;

  transportRunning = false;
  transportStep = 0;
  bossArpIndex = 0;

  if (transportInterval) {
    clearTimeout(transportInterval);
    transportInterval = null;
  }

  audioIntervals.forEach(id => clearTimeout(id));
  audioIntervals = [];

  activePadOscs.forEach(osc => {
    try { osc.stop(); } catch (e) {}
  });

  activePadOscs = [];

  if (activeEngineOsc) {
    try { activeEngineOsc.stop(); } catch (e) {}
    activeEngineOsc = null;
  }
}

function svgEl(tag, attrs={}){
  const el=document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  return el;
}
const BRAVURA = {
  trebleClef: "\uE050",
  bassClef: "\uE062",
  wholeNote: "\uE0A2"
};

function clearLayer(id){
  document.getElementById(id).innerHTML="";
}

function drawStaff(){
  clearLayer("staffLayer");

  const layer=document.getElementById("staffLayer");

  for(let i=0;i<5;i++){
    const y = STAFF_BOTTOM_Y - (i*STAFF_SPACING);

    layer.appendChild(
      svgEl("line",{
        x1:STAFF_LEFT,
        y1:y,
        x2:STAFF_RIGHT,
        y2:y,
        stroke:"white",
        "stroke-width":2
      })
    );
  }
}
const LETTERS = ["A","B","C","D","E","F","G"];
const NOTE_ORDER = ["C","D","E","F","G","A","B"];
const NOTEHEAD_VERTICAL_OFFSET = 0;
const SPEEDS = {
  easy:100,
  medium:180,
  hard:350
};

const ALL_NOTES = [];
for(let octave=2; octave<=6; octave++){
  for(let note of NOTE_ORDER){
    ALL_NOTES.push(note + octave);
  }
}

function noteIndex(note){
  return ALL_NOTES.indexOf(note);
}

function buildRange(low, high){
  return ALL_NOTES.slice(noteIndex(low), noteIndex(high)+1);
}

const RANGE_CONFIG = {
  treble:{
    beginner:["E4","F5"],
    intermediate:["C4","A5"],
    advanced:["G3","D6"]
  },
  bass:{
    beginner:["G2","A3"],
    intermediate:["E2","C4"],
    advanced:["C2","E4"]
  }
};

const TREBLE_STEPS = {
  G3:-5,
  A3:-4,
  B3:-3,
  C4:-2,
  D4:-1,
  E4:0,
  F4:1,
  G4:2,
  A4:3,
  B4:4,
  C5:5,
  D5:6,
  E5:7,
  F5:8,
  G5:9,
  A5:10,
  B5:11,
  C6:12,
  D6:13
};

const BASS_STEPS = {
  C2:-4,
  D2:-3,
  E2:-2,
  F2:-1,
  G2:0,
  A2:1,
  B2:2,
  C3:3,
  D3:4,
  E3:5,
  F3:6,
  G3:7,
  A3:8,
  B3:9,
  C4:10,
  D4:11,
  E4:12
};

function getStaffStep(note, clef){
  if(clef === "treble"){
    return TREBLE_STEPS[note];
  }
  return BASS_STEPS[note];
}

function noteToLetter(note){
  return note[0];
}
function drawClef(clef){
  clearLayer("clefLayer");
  const layer = document.getElementById("clefLayer");

  const glyph = clef === "treble"
      ? BRAVURA.trebleClef
      : BRAVURA.bassClef;

  const text = svgEl("text", {
      x: clef === "treble" ? 55 : 58,
      y: clef === "treble" ? 248 : 180,
      fill: "white",
      "font-family": "Bravura",
      "font-size": clef === "treble" ? 210 : 170
  });

  text.textContent = glyph;
  layer.appendChild(text);
}

function noteCenterY(step){
  return STAFF_BOTTOM_Y - (step * HALF_STEP);
}
let currentNote = null;

function drawWholeNote(x, y){
  clearLayer("noteLayer");
  const layer = document.getElementById("noteLayer");

  const text = svgEl("text", {
    x: x,
    y: y + NOTEHEAD_VERTICAL_OFFSET,
    fill: "#f8fdff",
    stroke: "#4ddcff",
    "stroke-width": "1",
    "font-family": "Bravura",
    "font-size": "88",
    "text-anchor": "central",
    "dominant-baseline": "central"
  });

  text.textContent = BRAVURA.wholeNote;
  layer.appendChild(text);

  return text;
}

function drawLedgerLines(step, x) {
  clearLayer("ledgerLayer");

  const layer = document.getElementById("ledgerLayer");

  const addLedger = (ledgerStep) => {
    const y = noteCenterY(ledgerStep);

    const line = svgEl("line", {
      x1: x - 30,
      y1: y,
      x2: x + 30,
      y2: y,
      stroke: "white",
      "stroke-width": 3
    });

    layer.appendChild(line);
  };

  if (step < 0) {
    for (let s = -2; s >= step; s -= 2) {
      addLedger(s);
    }
  }

  if (step > 8) {
    for (let s = 10; s <= step; s += 2) {
      addLedger(s);
    }
  }
}

function updateLedgerLines(step, x) {
  drawLedgerLines(step, x);
}

function spawnNote(noteName = null) {
  clearLayer("noteLayer");
  clearLayer("ledgerLayer");
  if (!noteName) {
    noteName = state.config.notes[
      Math.floor(Math.random() * state.config.notes.length)
    ];
  }

  const step = getStaffStep(noteName, state.config.clef);

  const x = STAFF_RIGHT - 40;
  const y = noteCenterY(step);

  const noteEl = drawWholeNote(x, y);
  drawLedgerLines(step, x);

  currentNote = {
    note: noteName,
    letter: noteToLetter(noteName),
    step,
    x,
    y,
    el: noteEl
  };
}

function moveNote(x){
  if(!currentNote) return;

  currentNote.x = x;
  currentNote.el.setAttribute("x", x);

  updateLedgerLines(currentNote.step, x);
}

const state = {
  running:false,
  score:0,
  lives:3,
  streak:0,
  level:1,
  totalCorrect:0,
  speedLevel:0,
  config:null,
  lastTime:0,
  animationFrame:null
};

function showMessage(text, color = "#22c55e") {
  const msg = document.getElementById("message");
  msg.textContent = text;
  msg.style.color = color;

  clearTimeout(showMessage.timer);
  showMessage.timer = setTimeout(() => {
    msg.textContent = "";
  }, 1500);
}

function updateHUD() {
  document.getElementById("score").textContent = state.score;
  document.getElementById("lives").textContent = state.lives;
  document.getElementById("streak").textContent = state.streak;
  
  const score = state.totalCorrect || 0;
  if (score >= 60) {
    document.getElementById("level").textContent = "HYPER BOSS";
  } else if (score >= 50) {
    document.getElementById("level").textContent = "BOSS MODE";
  } else {
    document.getElementById("level").textContent = state.level;
  }

  let rangeText;

  if (state.config.range === "custom") {
    rangeText = `Custom ${state.config.low}-${state.config.high}`;
  } else {
    rangeText =
      state.config.range.charAt(0).toUpperCase() +
      state.config.range.slice(1);
  }

  document.getElementById("settingsDisplay").textContent =
    `${state.config.clef === "treble" ? "Treble" : "Bass"} Clef • ${rangeText}`;
}

function missNote() {
  playWarningBeep();
  state.lives--;
  state.streak = 0;

  showMessage(
    `Missed! The note was ${currentNote.note}`,
    "#f59e0b"
  );

  updateHUD();

  if (state.lives <= 0) {
    gameOver();
    return;
  }

  spawnNote();
}

function gameOver() {
  playGameOverSound();
  stopBackgroundMusic();
  state.running = false;
  cancelAnimationFrame(state.animationFrame);

  if (state.score > highScore) {
    highScore = state.score;
    localStorage.setItem("staffWarsHighScore", highScore);
    updateHighScoreUI();
  }

  document.getElementById("finalScore").textContent = state.score;
  document.getElementById("overlay").style.display = "flex";
}

function animationLoop(timestamp) {
  if (!state.running) return;

  const dt = (timestamp - state.lastTime) / 1000;
  state.lastTime = timestamp;

  const speed =
  SPEEDS[state.config.speed] +
  (state.speedLevel * 75);
  
 if (padBus) {
  padBus.gain.value =
    Math.min(0.18 + state.level * 0.01, 0.32);
}

  const nextX = currentNote.x - (speed * dt);

  moveNote(nextX);

  if (nextX <= 120) {
    missNote();
  }

  state.animationFrame = requestAnimationFrame(animationLoop);
}
function createAnswerButtons() {
  const container = document.getElementById("buttons");
  container.innerHTML = "";

  ["A","B","C","D","E","F","G"].forEach(letter => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = letter;
    btn.onclick = () => submitAnswer(letter);
    container.appendChild(btn);
  });
}

function submitAnswer(letter) {
  if (!state.running || !currentNote) return;

  if (letter === currentNote.letter) {
    handleCorrectAnswer();
  } else {
    handleWrongAnswer();
  }
}

function handleCorrectAnswer() {
  playLaserSound();
  playCorrectSound();
  state.score++;
  state.streak++;
  state.totalCorrect++;

  if (state.totalCorrect === 50) {
    showMessage("⚠️ GET IN THE ZONE ⚠️", "#38bdf8");
  } else if (state.totalCorrect === 60) {
    showMessage("⚡ HYPER SPEED UPBEAT GEAR ⚡", "#ef4444");
  } else if (state.streak % 10 === 0) {
    state.lives++;
    showMessage("Bonus Life Earned!", "#22c55e");
  } else {
    showMessage("Correct!", "#22c55e");
  }

  if (state.totalCorrect % 10 === 0) {
    state.speedLevel++;
  }

  if (state.totalCorrect % 20 === 0) {
    state.level++;
  }

  updateHUD();
  spawnNote();
}

function handleWrongAnswer() {
  playWrongSound();
  state.lives--;
  state.streak = 0;

  showMessage("Incorrect", "#ef4444");
  updateHUD();

  if (state.lives <= 0) {
    gameOver();
    return;
  }

  spawnNote();
}

window.addEventListener("keydown", (e) => {
  const key = e.key.toUpperCase();

  if (LETTERS.includes(key)) {
    submitAnswer(key);
  }
});
const lowSelect = document.getElementById("lowNote");
const highSelect = document.getElementById("highNote");

let highScore = Number(localStorage.getItem("staffWarsHighScore") || 0);

function updateHighScoreUI(){
  document.getElementById("highScoreValue").textContent = highScore;
}
function populateDropdowns() {
  ALL_NOTES.forEach(note => {
    lowSelect.add(new Option(note, note));
    highSelect.add(new Option(note, note));
  });

  lowSelect.value = "C4";
  highSelect.value = "A5";
}

populateDropdowns();
updateHighScoreUI();

document.querySelectorAll('input[name="range"]').forEach(radio => {
  radio.addEventListener("change", () => {
    document.getElementById("customRange").style.display =
      document.querySelector('input[name="range"]:checked').value === "custom"
        ? "block"
        : "none";
  });
});

function getGameConfig() {
  const clef = document.querySelector('input[name="clef"]:checked').value;
  const range = document.querySelector('input[name="range"]:checked').value;
  const speed = document.querySelector('input[name="speed"]:checked').value;

  let notes;
  let low = null;
  let high = null;

  if (range === "custom") {
    low = lowSelect.value;
    high = highSelect.value;

    if (noteIndex(high) <= noteIndex(low)) {
      alert("Highest note must be higher than lowest note.");
      return null;
    }

    notes = buildRange(low, high);
  } else {
    [low, high] = RANGE_CONFIG[clef][range];
    notes = buildRange(low, high);
  }

  return {
    clef,
    range,
    speed,
    notes,
    low,
    high
  };
}

function startGame() {
  const config = getGameConfig();
  if (!config) return;

  state.config = config;
  state.running = true;
  state.score = 0;
  state.lives = 3;
  state.streak = 0;
  state.level = 1;
  state.speedLevel = 0;
  state.totalCorrect = 0;
  bossArpIndex = 0;

  document.getElementById("setupScreen").classList.remove("active");
  document.getElementById("gameScreen").classList.add("active");

  drawStaff();
  drawClef(config.clef);
  createAnswerButtons();
  updateHUD();
  spawnNote();

  try {
    if (!audioCtx) {
      initAudio();
    }
    if (audioCtx && audioCtx.state === "suspended") {
      audioCtx.resume();
    }
  } catch (audioCtxError) {
    console.error("AudioContext failed to wake up:", audioCtxError);
  }

  try {
    startBackgroundMusicIfNeeded();
  } catch (musicError) {
    console.error("Background music failed to start:", musicError);
  }

  state.lastTime = performance.now();
  cancelAnimationFrame(state.animationFrame);
  state.animationFrame = requestAnimationFrame(animationLoop);
}

document.getElementById("startBtn").addEventListener("click", startGame);

document.getElementById("playAgain").addEventListener("click", () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("setupScreen").classList.add("active");
  stopBackgroundMusic();
});

document.getElementById("resetHighScore").addEventListener("click", () => {
  highScore = 0;
  localStorage.setItem("staffWarsHighScore", 0);
  updateHighScoreUI();
});

document.getElementById("startOverBtn").addEventListener("click", () => {
  if (!confirm("Return to start screen? Current game will be lost.")) return;
  stopBackgroundMusic();
  state.running = false;
  cancelAnimationFrame(state.animationFrame);

  clearLayer("noteLayer");
  clearLayer("ledgerLayer");

  document.getElementById("overlay").style.display = "none";
  document.getElementById("gameScreen").classList.remove("active");
  document.getElementById("setupScreen").classList.add("active");
});
